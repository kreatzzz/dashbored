name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Prisma validates the datasource during client generation. No database
      # connection is made by this job.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/dashbored_ci
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # The generated Prisma client is intentionally not committed. Generate it
      # on the clean runner before TypeScript reads application imports.
      - run: bun run db:generate
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  container:
    name: Validate container image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      POSTGRES_PASSWORD: ci-postgres-password-not-for-production
      BETTER_AUTH_SECRET: ci-auth-secret-not-for-production-0123456789
      BETTER_AUTH_URL: http://localhost:3010
      CREDENTIAL_MASTER_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      BOOTSTRAP_EMAIL: ci@example.test
      BOOTSTRAP_PASSWORD: ci-bootstrap-password-not-for-production
      DASHBORED_IMAGE: ghcr.io/kreatzzz/dashbored:0.1.0
      DASHBOARD_PORT: 3010
    steps:
      - uses: actions/checkout@v6
      - name: Validate Compose interpolation
        run: docker compose config --quiet
      - name: Validate release-image Compose file
        run: docker compose -f compose.ghcr.yaml config --quiet
      - name: Build production image
        run: docker build --tag dashbored:ci .
      - name: Start a clean Compose stack
        run: docker compose up --build --detach
      - name: Verify migration, database, and web readiness
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:3010/api/health | grep -qx '{"status":"ok"}'; then
              docker compose exec -T postgres pg_isready -U dashbored -d dashbored
              exit 0
            fi
            sleep 2
          done
          echo "Dashbored did not become ready within 120 seconds" >&2
          exit 1
      - name: Show Compose diagnostics
        if: always()
        run: docker compose ps && docker compose logs --no-color
      - name: Remove smoke-test stack
        if: always()
        run: docker compose down --volumes --remove-orphans
